<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Godseye: Local Earth OS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Roboto Mono', monospace;
        }

        #cesiumContainer {
            width: 100%;
            height: 100%;
        }

        /* Top Bar */
        #topBar {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .gl {
            pointer-events: auto;
            background: rgba(0, 20, 40, 0.85);
            border: 1px solid #00f0ff;
            color: #00f0ff;
            padding: 5px 15px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            backdrop-filter: blur(4px);
        }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stat-val {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px #fff;
        }

        .stat-lbl {
            font-size: 10px;
            color: #aaa;
        }

        /* Controls */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
            pointer-events: auto;
        }

        .btn {
            background: rgba(0, 20, 40, 0.85);
            border: 1px solid #00f0ff;
            color: #00f0ff;
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #00f0ff;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
        }

        .btn.active {
            background: #00f0ff;
            color: #000;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="topBar">
        <div class="gl">Godseye v5 : Local Earth OS</div>
        <div class="stats gl">
            <div class="stat"><span class="stat-val" id="stat-ac">0</span><span class="stat-lbl">AIRCRAFT</span></div>
            <div class="stat"><span class="stat-val" id="stat-sat">0</span><span class="stat-lbl">SATELLITES</span>
            </div>
            <div class="stat"><span class="stat-val" id="stat-fps">0</span><span class="stat-lbl">FPS</span></div>
        </div>
    </div>

    <div id="controls">
        <button class="btn active" id="btn-aircraft">Toggle Aircraft</button>
        <button class="btn active" id="btn-satellite">Toggle Satellites</button>
    </div>

    <div id="cesiumContainer"></div>
    <script type="module" src="/main.js"></script>
</body>

</html>
